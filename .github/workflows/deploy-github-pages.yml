# البناء: npm run build → ينتج dist/
# النشر: upload-pages-artifact يرفع **محتويات dist/ فقط** — deploy يسحب نفس الأرشيف (لا جذر الريبو).
# لا تستخدم «Deploy from a branch» (index.html المصدر يشير إلى /src/main.jsx = 404).
#
# GitHub: Settings → Pages → Build and deployment: Source = GitHub Actions (ليس «Deploy from a branch»)
# بعد أول دفع ينجح: الصفحة على https://<user>.github.io/<اسم-الريبو>/
#
# متغيّرات (اختياري) — Settings → Secrets and variables → Actions
#   لا تبدأ أسماء Secrets بـ GITHUB_ (محجوز لدى GitHub)
#   • Variables أو Secrets: VITE_BASE = مثلاً /NAWA/  |  FULL_REPO = owner/name (لتجاوز الريبو الافتراضي)
#   • السر/المتغير FULL_REPO يوضع في process.env باسم GITHUB_REPOSITORY للمكوّن.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (npm run build) → dist/
        run: npm run build
        env:
          GITHUB_REPOSITORY: ${{ secrets.FULL_REPO || vars.FULL_REPO || github.repository }}
          VITE_BASE: ${{ secrets.VITE_BASE || vars.VITE_BASE || format('/{0}/', github.event.repository.name) }}

      - name: تأكد أن مصدر النشر = مجلد dist
        run: |
          test -d dist || { echo "missing dist/"; exit 1; }
          test -f dist/index.html || { echo "missing dist/index.html"; exit 1; }
          echo "حجم dist:" && du -sh dist
          echo "أهم الملفات:" && ls -la dist

      - name: Verify dist is production (not /src/main.jsx)
        run: |
          if grep -qF "/src/main" dist/index.html; then
            echo "FATAL: dist/index.html still has dev /src/main — use npm run build output only on Pages."
            exit 1
          fi
          echo "OK: production bundle in dist/index.html"
          grep -E "<script" dist/index.html | head -5

      - name: رفع dist كأرشيف GitHub Pages (هذا فقط يُنشر)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ينشر آخر أرشيف مرفوع من build (محتويات dist/ فقط)
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: نشر أرشيف dist إلى GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
