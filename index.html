<!DOCTYPE html>
<html lang="en" dir="ltr" data-locale="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NAWA Holding — Company Profile</title>
    <meta
      name="description"
      content="NAWA Holding — diversified investment and business development. Headquartered in Riyadh, Kingdom of Saudi Arabia."
    />
    <link rel="icon" type="image/png" href="/nawa_logo.png" />
    <link rel="apple-touch-icon" href="/nawa_logo.png" />
    <meta name="theme-color" content="#0a0800" />
    <meta name="msapplication-TileImage" content="/nawa_logo.png" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NAWA Holding" />
    <meta property="og:title" content="NAWA Holding — Company Profile" />
    <meta
      property="og:description"
      content="NAWA Holding — diversified investment and business development. Riyadh, Kingdom of Saudi Arabia."
    />
    <meta property="og:image" content="/nawa_logo.png" />
    <meta property="og:image:alt" content="NAWA Holding" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NAWA Holding — Company Profile" />
    <meta
      name="twitter:description"
      content="NAWA Holding — diversified investment and business development. Riyadh, Kingdom of Saudi Arabia."
    />
    <meta name="twitter:image" content="/nawa_logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;700&family=Tajawal:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var ar = false;
        try {
          ar = localStorage.getItem('nawa-locale') === 'ar';
        } catch (e) {}
        var d = document.documentElement;
        d.setAttribute('lang', ar ? 'ar' : 'en');
        d.setAttribute('dir', ar ? 'rtl' : 'ltr');
        d.setAttribute('data-locale', ar ? 'ar' : 'en');
      })();
    </script>
  </head>
  <body>
    <script>
      (function () {
        try {
          var dr = document.documentElement.getAttribute('dir') || 'ltr';
          var lg = document.documentElement.getAttribute('lang') || 'en';
          document.body.setAttribute('dir', dr);
          document.body.setAttribute('lang', lg);
        } catch (e) {}
        try {
          var s = localStorage.getItem('nawa-theme');
          if (s === 'light' || s === 'dark') {
            document.documentElement.setAttribute('data-theme', s);
            return;
          }
        } catch (e) {}
        try {
          var dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
